name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # No key committed — the suite runs in deterministic mock mode.
      # Add ANTHROPIC_API_KEY as a repo secret to enable live AI diagnoses.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      AI_MODE: auto
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests (+ AI layer)
        run: npm test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload AI reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: ai-reports
          path: .ai-reports/
          retention-days: 7
